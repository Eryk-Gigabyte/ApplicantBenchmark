services:
  db:
    image: postgres:15-alpine
    container_name: applicant_benchmark_container
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=my_db
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - employee_data:/var/lib/postgresql/data

volumes:
  employee_data: